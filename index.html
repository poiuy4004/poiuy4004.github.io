    <!-- Applies the saved theme before first paint so dark-mode visitors
         never see a white flash. Must stay in sync with src/main/hooks/useTheme.ts. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme-preference");
          var pref =
            saved === "light" || saved === "dark" || saved === "system"
              ? saved
              : "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* storage blocked — fall back to the CSS default */
        }
      })();
    </script>
